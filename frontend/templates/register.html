<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Create Account - AI Dubbing</title>
        <link rel="stylesheet" href="/static/style.css" />
        <script src="https://unpkg.com/@phosphor-icons/web"></script>
        <style>
            .auth-container {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background-color: var(--bg-dark);
                padding: 20px;
            }
            .auth-form {
                background-color: var(--bg-card);
                padding: 40px;
                border-radius: 16px;
                border: 1px solid var(--border-color);
                width: 100%;
                max-width: 450px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            }
            .auth-header {
                text-align: center;
                margin-bottom: 30px;
            }
            .auth-icon-box {
                width: 60px;
                height: 60px;
                background: linear-gradient(135deg, rgba(0, 194, 203, 0.2), rgba(0, 194, 203, 0.05));
                border: 1px solid rgba(0, 194, 203, 0.2);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 20px;
                color: var(--primary);
                font-size: 1.8rem;
                box-shadow: 0 0 20px rgba(0, 194, 203, 0.1);
            }
            .auth-form h2 {
                font-size: 1.8rem;
                margin-bottom: 10px;
                font-weight: 700;
            }
            .auth-form p {
                color: var(--text-muted);
                font-size: 0.95rem;
            }
            .form-group {
                margin-bottom: 20px;
                position: relative;
            }
            .form-group label {
                display: block;
                margin-bottom: 8px;
                color: var(--text-muted);
                font-size: 0.85rem;
                font-weight: 500;
            }
            .input-wrapper {
                position: relative;
                display: flex;
                align-items: center;
            }
            .input-icon {
                position: absolute;
                left: 14px;
                color: var(--text-muted);
                font-size: 1.1rem;
                pointer-events: none;
            }
            .toggle-password {
                position: absolute;
                right: 14px;
                color: var(--text-muted);
                cursor: pointer;
                font-size: 1.1rem;
                transition: color 0.2s;
            }
            .toggle-password:hover {
                color: var(--text-white);
            }
            .form-group input {
                width: 100%;
                padding: 12px 14px 12px 42px; /* Left padding for icon */
                background: #0f131a;
                border: 1px solid var(--border-color);
                border-radius: 10px;
                color: var(--text-white);
                font-size: 0.95rem;
                transition: all 0.2s;
            }
            .form-group input:focus {
                outline: none;
                border-color: var(--primary);
                background: #131820;
                box-shadow: 0 0 0 3px rgba(0, 194, 203, 0.1);
            }
            .form-group input::placeholder {
                color: rgba(148, 163, 184, 0.5);
            }
            .helper-text {
                font-size: 0.75rem;
                color: var(--text-muted);
                margin-top: 6px;
            }
            .checkbox-group {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 25px;
                font-size: 0.85rem;
                color: var(--text-muted);
            }
            .checkbox-group input[type="checkbox"] {
                accent-color: var(--primary);
                width: 16px;
                height: 16px;
            }
            .checkbox-group a {
                color: var(--primary);
                font-weight: 500;
            }
            .auth-form .btn {
                width: 100%;
                padding: 14px;
                border-radius: 10px;
                font-size: 1rem;
                margin-top: 5px;
                box-shadow: 0 4px 12px rgba(0, 194, 203, 0.2);
            }
            .divider {
                display: flex;
                align-items: center;
                text-align: center;
                margin: 25px 0;
                color: var(--text-muted);
                font-size: 0.8rem;
            }
            .divider::before, .divider::after {
                content: '';
                flex: 1;
                border-bottom: 1px solid var(--border-color);
            }
            .divider span {
                padding: 0 10px;
            }
            .social-buttons {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                margin-bottom: 25px;
            }
            .social-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 12px;
                background: transparent;
                border: 1px solid var(--border-color);
                border-radius: 10px;
                color: var(--text-white);
                font-weight: 500;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all 0.2s;
            }
            .social-btn:hover {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(255, 255, 255, 0.2);
            }
            .switch-auth {
                text-align: center;
                padding-top: 20px;
                border-top: 1px solid var(--border-color);
                font-size: 0.9rem;
                color: var(--text-muted);
            }
            .switch-auth a {
                color: var(--primary);
                font-weight: 600;
                margin-left: 5px;
            }
        </style>
    </head>
    <body>
        <div class="auth-container">
            <div class="auth-form">
                <div class="auth-header">
                    <div class="auth-icon-box">
                        <i class="ph-fill ph-user-plus"></i>
                    </div>
                    <h2>Create Account</h2>
                    <p>Sign up to get started with your account</p>
                </div>

                <form action="/api/register" method="post">
                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <div class="input-wrapper">
                            <i class="ph ph-user input-icon"></i>
                            <input
                                type="text"
                                id="full_name"
                                name="full_name"
                                placeholder="Enter your full name"
                                required
                            />
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="ph ph-envelope-simple input-icon"></i>
                            <input
                                type="email"
                                id="email"
                                name="username" 
                                placeholder="Enter your email"
                                required
                            />
                        </div>
                         <!-- Backend expects 'username' for now, using email as username -->
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="ph ph-lock-key input-icon"></i>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Create a password"
                                required
                                minlength="8"
                            />
                            <i class="ph ph-eye toggle-password" onclick="togglePassword('password', this)"></i>
                        </div>
                        <div class="helper-text">Must be at least 8 characters long</div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="ph ph-lock-key input-icon"></i>
                            <input
                                type="password"
                                id="confirm_password"
                                name="confirm_password"
                                placeholder="Confirm your password"
                                required
                            />
                            <i class="ph ph-eye toggle-password" onclick="togglePassword('confirm_password', this)"></i>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required checked>
                        <label for="terms" style="display:inline; margin:0">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Create Account
                    </button>
                    
                    <div class="divider">
                        <span>Or sign up with</span>
                    </div>

                    <div class="social-buttons">
                        <button type="button" class="social-btn">
                            <i class="ph-fill ph-google-logo" style="color: #EA4335; font-size: 1.2rem;"></i>
                            Google
                        </button>
                        <button type="button" class="social-btn">
                            <i class="ph-fill ph-github-logo" style="color: #fff; font-size: 1.2rem;"></i>
                            GitHub
                        </button>
                    </div>
                </form>

                <div class="switch-auth">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </div>
        </div>

        <script>
            function togglePassword(inputId, icon) {
                const input = document.getElementById(inputId);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("ph-eye");
                    icon.classList.add("ph-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("ph-eye-slash");
                    icon.classList.add("ph-eye");
                }
            }

            // Simple client-side password match validation
            document.querySelector("form").addEventListener("submit", function(e) {
                const password = document.getElementById("password").value;
                const confirm = document.getElementById("confirm_password").value;
                
                if (password !== confirm) {
                    e.preventDefault();
                    alert("Passwords do not match!");
                }
            });
        </script>
    </body>
</html>
