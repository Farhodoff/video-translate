<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Dubbing</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            padding: 20px;
        }

        .auth-form {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-icon-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(88, 28, 135, 0.4), rgba(88, 28, 135, 0.1));
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #a78bfa;
            font-size: 1.8rem;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .auth-form h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .auth-form p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-white);
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            /* Left padding for icon */
            background: #0f131a;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-white);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8b5cf6;
            /* Purple focus for login */
            background: #131820;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            accent-color: #8b5cf6;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #93c5fd;
        }

        .auth-form .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 5px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            /* Blue to Purple gradient */
            border: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-form .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider span {
            padding: 0 10px;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-white);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .footer-text {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: #60a5fa;
            font-weight: 600;
            margin-left: 5px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-form">
            <div class="auth-header">
                <div class="auth-icon-box">
                    <i class="ph-fill ph-lock-key"></i>
                </div>
                <h2>Welcome Back</h2>
                <p>Sign in to continue to your account</p>
            </div>

            <form action="/api/login" method="post">
                <!-- Email (Username) -->
                <div class="form-group">
                    <label for="username">Email Address</label>
                    <div class="input-wrapper">
                        <i class="ph ph-envelope-simple input-icon"></i>
                        <input type="email" id="username" name="username" placeholder="Enter your email" required />
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password"
                            required />
                        <i class="ph ph-eye toggle-password" onclick="togglePassword('password', this)"></i>
                    </div>
                </div>

                <div class="auth-options">
                    <label class="checkbox-group">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary">
                    Sign In
                </button>

                <div class="divider">
                    <span>Or continue with</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="social-btn">
                        <i class="ph-fill ph-google-logo" style="color: #EA4335; font-size: 1.2rem;"></i>
                        Google
                    </button>
                    <button type="button" class="social-btn">
                        <i class="ph-fill ph-github-logo" style="color: #fff; font-size: 1.2rem;"></i>
                        GitHub
                    </button>
                </div>
            </form>

            <div class="footer-text">
                Don't have an account? <a href="/register">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("ph-eye");
                icon.classList.add("ph-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("ph-eye-slash");
                icon.classList.add("ph-eye");
            }
        }
    </script>
</body>

</html>
