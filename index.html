<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dublyaj Studiyasi - Static Vercel</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 500px;
            width: 90%;
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .status {
            background: #22c55e;
            color: #052e16;
            padding: 8px 16px;
            border-radius: 9999px;
            font-weight: bold;
            display: inline-block;
            margin: 20px 0;
        }
        p { color: #94a3b8; line-height: 1.6; font-size: 1.1rem; }
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Sayt Ishlayapti!</h1>
        <div class="status">Vercel Static Deployment</div>
        <br>
        <p>Siz ushbu sahifani ko'rayotgan bo'lsangiz, demak Vercel deployment muvaffaqiyatli amalga oshdi.</p>
        <p style="font-size: 0.9em; margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px;">
            ⚠️ Bu statik test sahifasi. <br>
            To'liq AI funksiyalar uchun Render.com dan foydalaning.
        </p>
        <a href="https://render.com" class="btn">Render.com ga o'tish</a>
    </div>
</body>
</html>
